# ── TextileLab Studio — docker-compose.yml ───────────────────────────
# Usage :
#   docker compose up -d          → démarrer en arrière-plan
#   docker compose logs -f        → voir les logs
#   docker compose down           → arrêter
#   docker compose pull && docker compose up -d  → mettre à jour
#
# Avant de lancer : copier .env.example en .env et remplir les valeurs
# ─────────────────────────────────────────────────────────────────────

services:
  textilelab:
    build: .
    container_name: textilelab-studio
    restart: unless-stopped
    ports:
      - "3001:3001"       # Changer le port gauche pour exposer sur un autre port hôte
    env_file:
      - .env              # Toutes les variables d'env viennent de .env
    volumes:
      - ./db:/app/db                        # Base SQLite persistante
      - ./uploads:/app/uploads              # Fichiers uploadés (library, renders)
      - ./public:/app/public                # Pages HTML (studio, admin, backoffice)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Optionnel : Nginx reverse proxy ──────────────────────────────
