# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "9f77ba5672b593f4e6a5d32d2093e460"
name = "Textile Studio Lab"
application_url = "https://textile-studio-production.up.railway.app"
embedded = true

[webhooks]
api_version = "2024-01"

# Audit B8 — déclarations statiques exigées par Shopify review depuis 2024
[[webhooks.subscriptions]]
topics = ["app/uninstalled"]
uri = "/shopify/webhook"

# compliance_topics (GDPR) : à déclarer dans Partners Dashboard > App setup > GDPR webhooks
# (Shopify requiert l'approbation "Protected Customer Data" avant de les accepter dans le TOML)

# orders/paid : contient des données client protégées → approbation requise avant ajout ici
# Webhook enregistré dynamiquement au bootstrap (server.js) en attendant l'approbation

[app_proxy]
url = "https://textile-studio-production.up.railway.app/proxy"
subpath = "textilelab"
prefix = "apps"

[access_scopes]
# Audit B7 — principe du moindre privilège : write_products/write_orders/read_customers retirés
# write_products : non utilisé dans le flow merchant principal (feature admin optionnelle)
# write_orders   : aucune mutation order dans le code
# read_customers : non nécessaire, Shopify fournit l'email dans le payload GDPR directement
scopes = "read_products,read_orders"

[auth]
redirect_urls = [
  "https://textile-studio-production.up.railway.app/oauth/callback"
]

[pos]
embedded = false
