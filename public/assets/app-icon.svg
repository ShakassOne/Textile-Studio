<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5c6ac4"/>
      <stop offset="100%" style="stop-color:#9c6fe4"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#FCD34D"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background rounded square (1200×1200, radius 240 — conforme Shopify 1:1) -->
  <rect width="1200" height="1200" rx="240" ry="240" fill="url(#bg)"/>

  <!-- T-shirt silhouette -->
  <g filter="url(#shadow)">
    <path d="
      M 340 280
      L 240 380 L 320 420 L 320 900
      L 880 900 L 880 420 L 960 380
      L 860 280
      C 840 340 780 380 700 380
      C 670 400 640 410 600 410
      C 560 410 530 400 500 380
      C 420 380 360 340 340 280 Z
    " fill="url(#accent)" opacity="0.9"/>
  </g>

  <!-- Zone d'impression (rectangle sur le tshirt) -->
  <rect x="450" y="460" width="300" height="340" rx="12" fill="white" opacity="0.08"/>
  <rect x="450" y="460" width="300" height="340" rx="12" fill="none" stroke="white" stroke-width="3" stroke-dasharray="14,8" opacity="0.35"/>

  <!-- Lettre T stylisée + Lab -->
  <text x="600" y="680"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="900"
    font-size="200"
    text-anchor="middle"
    fill="url(#gold)"
    letter-spacing="-8"
    filter="url(#shadow)">T</text>

  <!-- Points de design (palette) -->
  <circle cx="440" cy="750" r="18" fill="#F59E0B" opacity="0.9"/>
  <circle cx="490" cy="790" r="14" fill="#9c6fe4" opacity="0.8"/>
  <circle cx="530" cy="760" r="16" fill="#5c6ac4" opacity="0.9"/>
  <circle cx="680" cy="755" r="16" fill="#10B981" opacity="0.8"/>
  <circle cx="720" cy="790" r="14" fill="#EF4444" opacity="0.8"/>
  <circle cx="760" cy="758" r="18" fill="#3B82F6" opacity="0.8"/>

  <!-- Nom de l'app (petit, en bas) -->
  <text x="600" y="1060"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="700"
    font-size="72"
    text-anchor="middle"
    fill="white"
    opacity="0.7"
    letter-spacing="6">TEXTILELAB</text>
</svg>
