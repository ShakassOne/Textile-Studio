<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TextileLab Studio</title>
  <!--
    App Bridge 4 — la clé API est lue par le CDN depuis cette meta tag
    Le serveur injecte la vraie valeur à la place de {{SHOPIFY_API_KEY}}
  -->
  <meta id="shopify-api-key" name="shopify-api-key" content="{{SHOPIFY_API_KEY}}">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f6f6f7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #202223;
    }
    .loader { text-align: center; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #e0e0e0;
      border-top-color: #5c6ac4;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader p { font-size: 14px; color: #6d7175; }
    .error-box {
      display: none;
      background: #fff4f4;
      border: 1px solid #fcc;
      border-radius: 8px;
      padding: 20px 24px;
      max-width: 420px;
      text-align: left;
    }
    .error-box h3 { color: #d82c0d; margin-bottom: 8px; font-size: 15px; }
    .error-box p  { font-size: 13px; color: #6d7175; }
  </style>
</head>
<body>

<div class="loader" id="loader">
  <div class="spinner"></div>
  <p>Chargement de TextileLab Studio…</p>
</div>

<div class="error-box" id="error-box">
  <h3>&#x26A0;&#xFE0F; Erreur d'initialisation</h3>
  <p id="error-msg">Une erreur est survenue lors du chargement de l'application.</p>
</div>

<!--
  Shopify App Bridge 4 (CDN)
  Doc : https://shopify.dev/docs/api/app-bridge
  Le CDN lit automatiquement la meta[name="shopify-api-key"] ci-dessus
  et initialise window.shopify — plus besoin de createApp()
-->
<script src="https://cdn.shopify.com/shopifycloud/app-bridge.js"></script>
<script>
(function () {
  'use strict';

  const params = new URLSearchParams(window.location.search);
  const shop   = params.get('shop') || '';
  const host   = params.get('host') || '';
  // La clé API est injectée dans la meta tag par le serveur (voir server.js)
  const apiKey = (document.getElementById('shopify-api-key') || {}).content || '';

  function showError(msg) {
    document.getElementById('loader').style.display = 'none';
    const box = document.getElementById('error-box');
    box.style.display = 'block';
    document.getElementById('error-msg').textContent = msg;
    console.error('[TextileLab] App Bridge error:', msg);
  }

  // Hors contexte Shopify (pas de shop/host dans l'URL) → admin standalone
  if (!shop || !host) {
    window.location.href = '/textilelab-admin.html';
    return;
  }

  if (!apiKey || apiKey === '{{SHOPIFY_API_KEY}}') {
    showError('SHOPIFY_API_KEY non configuree sur le serveur.');
    return;
  }

  // ── App Bridge 4 : shopify est deja initialise par le CDN via la meta tag ──
  // Pas de createApp() — on appelle directement shopify.idToken()
  async function bootstrap() {
    try {
      // idToken() = JWT signe par Shopify, valide ~1 min (remplace getSessionToken)
      const token = await shopify.idToken();

      sessionStorage.setItem('shopify_session_token', token);
      sessionStorage.setItem('shopify_shop', shop);
      sessionStorage.setItem('shopify_host', host);

      // Verification optionnelle cote backend
      const resp = await fetch('/api/shopify-session/verify', {
        method: 'POST',
        headers: {
          'Content-Type':  'application/json',
          'Authorization': 'Bearer ' + token,
        },
        body: JSON.stringify({ shop }),
      });

      if (!resp.ok) {
        const body = await resp.json().catch(() => ({}));
        throw new Error(body.error || 'HTTP ' + resp.status);
      }

      // Rediriger vers l'admin TextileLab dans le contexte embedded
      window.location.href = '/textilelab-admin.html?shopify=1&shop=' + encodeURIComponent(shop) + '&host=' + encodeURIComponent(host);

    } catch (err) {
      showError('Erreur de session Shopify : ' + err.message);
    }
  }

  bootstrap();
})();
</script>

</body>
</html>
